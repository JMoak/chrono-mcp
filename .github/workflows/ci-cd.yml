name: CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write
  id-token: write

jobs:
  ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: chrono-mcp
    steps:
      - name: Checkout chrono-mcp
        uses: actions/checkout@v7
        with:
          path: chrono-mcp

      - name: Checkout vibrissa (protocol test runner)
        uses: actions/checkout@v7
        with:
          repository: JMoak/vibrissa
          path: vibrissa

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: chrono-mcp/package-lock.json

      - name: Build vibrissa
        working-directory: vibrissa
        run: |
          npm ci
          npm run build

      - name: Install dependencies
        run: npm ci

      - name: Run linting
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Check build artifacts
        run: |
          if [ ! -f "dist/index.js" ]; then
            echo "Build failed - dist/index.js not found"
            exit 1
          fi
          echo "Build successful - artifacts created"

      - name: Run MCP protocol tests
        run: npm run test:mcp

  publish:
    needs: ci
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    defaults:
      run:
        working-directory: chrono-mcp
    steps:
      - name: Checkout chrono-mcp
        uses: actions/checkout@v7
        with:
          path: chrono-mcp
          fetch-depth: 0

      - name: Checkout vibrissa (for file: dependency)
        uses: actions/checkout@v7
        with:
          repository: JMoak/vibrissa
          path: vibrissa

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: chrono-mcp/package-lock.json
          registry-url: 'https://registry.npmjs.org'

      - name: Build vibrissa
        working-directory: vibrissa
        run: |
          npm ci
          npm run build

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Determine version bump
        id: version
        run: |
          # Get the latest commit message
          COMMIT_MSG=$(git log -1 --pretty=%B)
          echo "Commit message: $COMMIT_MSG"

          # Determine version bump based on conventional commits
          if [[ $COMMIT_MSG =~ ^feat(\(.+\))?!: ]] || [[ $COMMIT_MSG =~ BREAKING\ CHANGE ]]; then
            echo "bump=major" >> $GITHUB_OUTPUT
            echo "should_publish=true" >> $GITHUB_OUTPUT
          elif [[ $COMMIT_MSG =~ ^feat(\(.+\))?: ]]; then
            echo "bump=minor" >> $GITHUB_OUTPUT
            echo "should_publish=true" >> $GITHUB_OUTPUT
          elif [[ $COMMIT_MSG =~ ^fix(\(.+\))?: ]] || [[ $COMMIT_MSG =~ ^perf(\(.+\))?: ]]; then
            echo "bump=patch" >> $GITHUB_OUTPUT
            echo "should_publish=true" >> $GITHUB_OUTPUT
          else
            echo "bump=none" >> $GITHUB_OUTPUT
            echo "should_publish=false" >> $GITHUB_OUTPUT
            echo "No version bump needed for: $COMMIT_MSG"
          fi

      - name: Bump version and publish
        if: steps.version.outputs.should_publish == 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          # Bump version
          npm version ${{ steps.version.outputs.bump }} --no-git-tag-version

          # Get new version
          NEW_VERSION=$(node -p "require('./package.json').version")
          echo "Publishing version: $NEW_VERSION"

          # Publish to npm as public package
          npm publish --access public

          # Create and push git tag
          git add package.json
          git commit -m "chore: bump version to $NEW_VERSION [skip ci]"
          git tag "v$NEW_VERSION"
          git push origin main --tags

      - name: Skip publish
        if: steps.version.outputs.should_publish == 'false'
        run: echo "Skipping publish - commit message doesn't indicate a release"
